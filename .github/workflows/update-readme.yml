name: Update README

on:
  schedule:
    - cron: "*/90 * * * *" # Update every 90 minutes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update Profile README

    steps:
    - name: Checkout repo
        uses: actions/checkout@v3

      - name: Add activity to readme
        uses: Readme-Workflows/recent-activity@v2.4.1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
